<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet" />
  <style>
    .fluid-bg { background: radial-gradient(circle at 0% 0%, #ff5a19 0%, #ff4d4d 45%, #f3f3f3 100%); }
    .glass { background: rgba(255,255,255,.22); backdrop-filter: blur(12px) saturate(160%); -webkit-backdrop-filter: blur(12px) saturate(160%); border:1px solid rgba(255,255,255,.28); }
    .tabbar42 { background: rgba(255,255,255,.42); }
  </style>
  <title>Add Transaction</title>
</head>
<body class="font-[Inter]">
  <div class="mx-auto min-h-screen max-w-[780px] fluid-bg pb-28">
    <header class="flex items-center justify-between px-6 pt-8 pb-4 text-white">
      <a class="size-14 rounded-full glass grid place-items-center" href="index.html"><span class="material-symbols-outlined">close</span></a>
      <h1 class="text-5xl font-bold">Add Transaction</h1>
      <button class="size-14 rounded-full bg-[#2F5FF2] grid place-items-center shadow-lg"><span class="material-symbols-outlined">check</span></button>
    </header>

    <main class="px-6 pb-24">
      <div class="text-center py-8 text-white">
        <p class="uppercase tracking-[0.3em] text-xl opacity-75">Enter Amount</p>
        <div class="mt-3 flex items-end justify-center gap-2"><span class="text-6xl opacity-80">$</span><h2 class="text-8xl font-extrabold">0.00</h2></div>
      </div>

      <section>
        <h3 class="text-4xl font-semibold text-slate-700 uppercase">Category</h3>
        <div class="grid grid-cols-4 gap-4 mt-4">
          <button class="glass rounded-3xl p-4 text-white ring-2 ring-[#2F5FF2]"><span class="material-symbols-outlined text-4xl">shopping_bag</span><p class="mt-2 text-2xl">Shop</p></button>
          <button class="glass rounded-3xl p-4 text-slate-700"><span class="material-symbols-outlined text-4xl">restaurant</span><p class="mt-2 text-2xl">Dining</p></button>
          <button class="glass rounded-3xl p-4 text-slate-700"><span class="material-symbols-outlined text-4xl">flight</span><p class="mt-2 text-2xl">Travel</p></button>
          <button class="glass rounded-3xl p-4 text-slate-700"><span class="material-symbols-outlined text-4xl">receipt_long</span><p class="mt-2 text-2xl">Bills</p></button>
        </div>
      </section>

      <section class="mt-6 glass rounded-[2rem] overflow-hidden divide-y divide-white/25">
        <div class="p-5 flex gap-4 items-center"><span class="material-symbols-outlined text-slate-400">calendar_today</span><div><p class="text-xs uppercase text-slate-500">Date</p><p class="text-4xl font-medium text-slate-900">Today, 24 Oct 2023</p></div></div>
        <div class="p-5 flex gap-4 items-center"><span class="material-symbols-outlined text-slate-400">account_balance_wallet</span><div><p class="text-xs uppercase text-slate-500">Account</p><p class="text-4xl font-medium text-slate-900">Primary Checking (...4290)</p></div></div>
        <div class="p-5 flex gap-4 items-center"><span class="material-symbols-outlined text-slate-400">edit_note</span><p class="text-4xl text-slate-400">Add a note...</p></div>
      </section>
    </main>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[780px] border-t border-slate-200 tabbar42 backdrop-blur-2xl">
      <div class="px-4 pt-4 pb-7 grid grid-cols-5 items-end text-center">
        <a class="text-slate-400" href="index.html"><span class="material-symbols-outlined text-4xl">home</span><p class="text-lg">Home</p></a>
        <a class="text-slate-400" href="analysis.html"><span class="material-symbols-outlined text-4xl">pie_chart</span><p class="text-lg">Analysis</p></a>
        <a class="-mt-8 mx-auto size-20 rounded-full bg-[#2F5FF2] text-white grid place-items-center shadow-[0_0_30px_rgba(47,95,242,.45)]" href="add-transaction.html"><span class="material-symbols-outlined text-5xl">add</span></a>
        <a class="text-slate-400" href="#"><span class="material-symbols-outlined text-4xl">account_balance</span><p class="text-lg">Budget</p></a>
        <a class="text-slate-400" href="#"><span class="material-symbols-outlined text-4xl">person</span><p class="text-lg">Profile</p></a>
      </div>
    </nav>
  </div>
</body>
</html>
