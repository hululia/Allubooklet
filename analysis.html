<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet" />
  <style>
    .fluid-bg { background: linear-gradient(160deg,#f79a44 0%, #ebb0b0 34%, #f4f5f7 100%); }
    .glass { background: rgba(255,255,255,.24); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.35); }
    .tabbar42 { background: rgba(255,255,255,.42); }
  </style>
  <title>Analytics</title>
</head>
<body class="font-[Inter] text-slate-800">
  <div class="mx-auto min-h-screen max-w-[780px] fluid-bg pb-28">
    <header class="px-6 pt-8 pb-4 text-white flex justify-between items-center">
      <a class="size-14 rounded-full glass grid place-items-center" href="index.html"><span class="material-symbols-outlined">arrow_back</span></a>
      <h1 class="text-6xl font-bold">Analytics</h1>
      <button class="size-14 rounded-full glass grid place-items-center"><span class="material-symbols-outlined">calendar_month</span></button>
    </header>

    <main class="px-6 space-y-6">
      <section class="glass rounded-[2rem] p-6 text-white">
        <div class="flex justify-between items-start">
          <div><p class="text-3xl opacity-90">Total Spending</p><h2 class="text-7xl font-extrabold mt-1">$4,250.00</h2></div>
          <span class="px-4 py-2 rounded-full bg-emerald-200/60 text-emerald-500 font-bold text-2xl">+12.5%</span>
        </div>
        <div class="mt-8 flex justify-center">
          <div class="size-72 rounded-full border-[28px] border-blue-600 border-r-violet-500 border-t-fuchsia-500 border-l-transparent relative">
            <div class="absolute inset-0 grid place-items-center text-center"><p class="text-4xl opacity-80">Target</p><p class="text-6xl font-bold">82%</p></div>
          </div>
        </div>
      </section>

      <section>
        <h3 class="text-6xl font-extrabold text-slate-900">Spending Trend</h3>
        <div class="mt-4 glass rounded-[2rem] p-6">
          <div class="h-52 flex items-end gap-4">
            <div class="flex-1 rounded-t-full bg-indigo-200 h-20"></div>
            <div class="flex-1 rounded-t-full bg-indigo-200 h-32"></div>
            <div class="flex-1 rounded-t-full bg-indigo-300 ring-2 ring-blue-600 h-44"></div>
            <div class="flex-1 rounded-t-full bg-indigo-200 h-28"></div>
            <div class="flex-1 rounded-t-full bg-indigo-200 h-38"></div>
            <div class="flex-1 rounded-t-full bg-indigo-200 h-24"></div>
            <div class="flex-1 rounded-t-full bg-indigo-200 h-30"></div>
          </div>
          <div class="mt-3 grid grid-cols-7 text-center text-slate-400 text-2xl"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
        </div>
      </section>
    </main>

    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[780px] border-t border-slate-200 tabbar42 backdrop-blur-2xl">
      <div class="px-4 pt-4 pb-7 grid grid-cols-4 items-end text-center">
        <a class="text-slate-400" href="index.html"><span class="material-symbols-outlined text-4xl">home</span><p class="text-2xl">Home</p></a>
        <a class="text-[#2F5FF2]" href="analysis.html"><span class="material-symbols-outlined text-4xl">pie_chart</span><p class="text-2xl font-semibold">Analytics</p></a>
        <a class="text-slate-400" href="add-transaction.html"><span class="material-symbols-outlined text-4xl">account_balance_wallet</span><p class="text-2xl">Wallet</p></a>
        <a class="text-slate-400" href="#"><span class="material-symbols-outlined text-4xl">person</span><p class="text-2xl">Profile</p></a>
      </div>
    </nav>
  </div>
</body>
</html>
