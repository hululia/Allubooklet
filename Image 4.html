<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2559f4",
                        "background-light": "#f5f6f8",
                        "background-dark": "#101422",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .fluid-bg {
            background: radial-gradient(circle at 0% 0%, #f97316 0%, #ef4444 30%, #ffffff 85%);
            background-attachment: fixed;
            background-color: #ffffff;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 24px 0 rgba(0, 0, 0, 0.04);
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px) saturate(160%);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .category-btn-light {
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.03);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-display antialiased bg-background-light dark:bg-background-dark text-slate-900">
<div class="relative flex h-screen w-full flex-col overflow-hidden fluid-bg">
<header class="flex items-center justify-between px-6 pt-8 pb-4">
<button class="flex size-10 items-center justify-center rounded-full bg-white/10 text-white backdrop-blur-md">
<span class="material-symbols-outlined">close</span>
</button>
<h1 class="text-xl font-bold text-white">Add Transaction</h1>
<button class="flex size-10 items-center justify-center rounded-full bg-primary text-white shadow-lg">
<span class="material-symbols-outlined">check</span>
</button>
</header>
<main class="flex-1 overflow-y-auto px-6 pb-24">
<div class="flex flex-col items-center py-8">
<span class="text-sm font-medium text-white/70 uppercase tracking-widest mb-1">Enter Amount</span>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-semibold text-white/80">$</span>
<input class="w-full bg-transparent border-none text-center text-6xl font-bold text-white focus:ring-0 placeholder-white/40" type="text" value="0.00"/>
</div>
</div>
<div class="space-y-6">
<section>
<h3 class="text-slate-600 text-sm font-semibold mb-4 ml-1 uppercase tracking-wider">Category</h3>
<div class="grid grid-cols-4 gap-3">
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass text-white border-primary/40 ring-2 ring-primary">
<span class="material-symbols-outlined text-2xl">shopping_bag</span>
<span class="text-[10px] font-medium">Shop</span>
</button>
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass category-btn-light text-slate-700">
<span class="material-symbols-outlined text-2xl">restaurant</span>
<span class="text-[10px] font-medium">Dining</span>
</button>
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass category-btn-light text-slate-700">
<span class="material-symbols-outlined text-2xl">flight</span>
<span class="text-[10px] font-medium">Travel</span>
</button>
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass category-btn-light text-slate-700">
<span class="material-symbols-outlined text-2xl">receipt_long</span>
<span class="text-[10px] font-medium">Bills</span>
</button>
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass category-btn-light text-slate-700">
<span class="material-symbols-outlined text-2xl">directions_car</span>
<span class="text-[10px] font-medium">Auto</span>
</button>
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass category-btn-light text-slate-700">
<span class="material-symbols-outlined text-2xl">fitness_center</span>
<span class="text-[10px] font-medium">Health</span>
</button>
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass category-btn-light text-slate-700">
<span class="material-symbols-outlined text-2xl">movie</span>
<span class="text-[10px] font-medium">Fun</span>
</button>
<button class="flex flex-col items-center gap-2 rounded-xl p-3 liquid-glass category-btn-light text-slate-700">
<span class="material-symbols-outlined text-2xl">more_horiz</span>
<span class="text-[10px] font-medium">More</span>
</button>
</div>
</section>
<div class="glass-card rounded-2xl overflow-hidden divide-y divide-white/10">
<div class="flex items-center gap-4 p-4">
<span class="material-symbols-outlined text-slate-400">calendar_today</span>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 font-medium uppercase">Date</span>
<span class="text-sm text-slate-900 font-medium">Today, 24 Oct 2023</span>
</div>
</div>
<div class="flex items-center gap-4 p-4">
<span class="material-symbols-outlined text-slate-400">account_balance_wallet</span>
<div class="flex flex-col">
<span class="text-[10px] text-slate-500 font-medium uppercase">Account</span>
<span class="text-sm text-slate-900 font-medium">Primary Checking (...4290)</span>
</div>
<span class="material-symbols-outlined text-white/40 ml-auto text-sm">chevron_right</span>
</div>
<div class="flex items-center gap-4 p-4">
<span class="material-symbols-outlined text-slate-400">edit_note</span>
<input class="bg-transparent border-none p-0 text-sm text-slate-900 focus:ring-0 placeholder-slate-400 flex-1" placeholder="Add a note..." type="text"/>
</div>
</div>
</div>
</main>
<nav class="absolute bottom-0 w-full border-t backdrop-blur-2xl bg-white/80 shadow-[0_-8px_30px_rgb(0,0,0,0.04)] border-slate-100">
<div class="flex items-center justify-around px-4 pb-8 pt-4">
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">pie_chart</span>
<span class="text-[10px] font-medium">Analysis</span>
</a>
<div class="relative -top-6">
<button class="flex size-14 items-center justify-center rounded-full bg-primary text-white shadow-[0_0_20px_rgba(37,89,244,0.5)]">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">account_balance</span>
<span class="text-[10px] font-medium">Budget</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</a>
</div>
</nav>
</div>
</body></html>
